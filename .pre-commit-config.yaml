# Pre-commit hooks configuration for AIPY-VN
# Install with: pip install pre-commit
# Run: pre-commit install

repos:
  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: ^\.(md|txt|json)$
      - id: end-of-file-fixer
        exclude: ^\.(md|txt|json)$
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: detect-private-key
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Python hooks
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^apps/api-server/
      - id: ruff-format
        files: ^apps/api-server/

  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        files: ^apps/api-server/
        language_version: python3.11

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        files: ^apps/api-server/
        args: ["--profile", "black"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        files: ^apps/api-server/src/
        args: [--ignore-missing-imports, --no-strict-optional]
        additional_dependencies:
          - types-requests
          - types-redis

  # TypeScript/JavaScript hooks
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        files: ^apps/(web-customer|web-owner|web-admin)/src/
        types: [ts, tsx, js, jsx]
        additional_dependencies:
          - eslint@8.56.0
          - "@typescript-eslint/eslint-plugin@6.18.0"
          - "@typescript-eslint/parser@6.18.0"
          - eslint-config-prettier@9.1.0"
          - eslint-plugin-react@7.33.2"
          - eslint-plugin-react-hooks@4.6.0"

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: ^apps/(web-customer|web-owner|web-admin)/
        types_or: [ts, tsx, js, jsx, css, scss, json, md]
        additional_dependencies:
          - prettier@3.1.0

  # Security hooks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        files: ^apps/api-server/src/
        args: [-r, ., -f, json]
        additional_dependencies: ["bandit[toml]"]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: package-lock.json|pnpm-lock.yaml

  # Docker hooks
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        files: ^.*Dockerfile$

  # Shell hooks
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.6
    hooks:
      - id: shellcheck
        files: ^scripts/.*\.(sh|ps1)$

  # Custom hooks
  - repo: local
    hooks:
      - id: pytest-backend
        name: Run backend pytest
        entry: uv run pytest apps/api-server/tests/ -v --tb=short
        language: system
        files: ^apps/api-server/
        pass_filenames: false
        always_run: false

      - id: typecheck-frontend
        name: Type check frontend
        entry: bash -c 'for app in web-customer web-owner web-admin; do cd apps/$app && npm run type-check || true; cd ../..; done'
        language: system
        files: ^apps/(web-customer|web-owner|web-admin)/src/
        pass_filenames: false
        always_run: false
