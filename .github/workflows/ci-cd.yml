name: CI/CD Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vietstore_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        working-directory: ./apps/api-server
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
      
      - name: Run tests
        working-directory: ./apps/api-server
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/vietstore_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: |
          pytest tests/ -v

  test-frontend:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        app: [web-customer, web-owner, web-admin]
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json
      
      - name: Install dependencies
        working-directory: ./apps/${{ matrix.app }}
        run: npm ci
      
      - name: Run linter
        working-directory: ./apps/${{ matrix.app }}
        run: npm run lint --if-present
      
      - name: Run type check
        working-directory: ./apps/${{ matrix.app }}
        run: npm run type-check --if-present
      
      - name: Build
        working-directory: ./apps/${{ matrix.app }}
        run: npm run build

  build-docker:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build API Server
        run: |
          docker build -t vietstore-api:latest ./apps/api-server
      
      - name: Build Customer App
        run: |
          docker build -t vietstore-customer:latest ./apps/web-customer
      
      - name: Build Owner App
        run: |
          docker build -t vietstore-owner:latest ./apps/web-owner
      
      - name: Build Admin App
        run: |
          docker build -t vietstore-admin:latest ./apps/web-admin
      
      - name: Push to Registry (if on master)
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          echo "Pushing images to registry..."
          # Add your registry push commands here
          # docker tag vietstore-api:latest registry.example.com/vietstore-api:latest
          # docker push registry.example.com/vietstore-api:latest

  deploy:
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to Production
        run: |
          echo "Deploying to production..."
          # Add your deployment commands here
          # kubectl apply -f k8s/
          # or
          # docker compose -f docker-compose.prod.yml up -d
