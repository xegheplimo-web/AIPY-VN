name: CI/CD Pipeline

on:
  push:
    branches: [ master, develop, 'feature/*' ]
  pull_request:
    branches: [ master, develop ]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # Security Scanning
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install security tools
        working-directory: ./apps/api-server
        run: |
          pip install safety pip-audit bandit trufflehog3
          
      - name: Run safety check
        working-directory: ./apps/api-server
        run: safety check --json > safety-report.json || true
        continue-on-error: true
      
      - name: Run pip-audit
        working-directory: ./apps/api-server
        run: pip-audit --output-format=json > pip-audit-report.json || true
        continue-on-error: true
      
      - name: Run bandit security scan
        working-directory: ./apps/api-server/src
        run: bandit -r . -f json -o bandit-report.json || true
        continue-on-error: true
      
      - name: Run trufflehog3 for secrets
        run: trufflehog3 . --json --output trufflehog-report.json || true
        continue-on-error: true
      
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            apps/api-server/safety-report.json
            apps/api-server/pip-audit-report.json
            apps/api-server/src/bandit-report.json
            trufflehog-report.json
          retention-days: 30

  # Backend Tests
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: security-scan
    
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vietstore_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
        options: >-
          --health-cmd "curl -f http://localhost:6333/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: apps/api-server/requirements.txt
      
      - name: Install dependencies
        working-directory: ./apps/api-server
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-mock httpx aiosqlite
          
      - name: Run linting
        working-directory: ./apps/api-server
        run: |
          ruff check src/
          mypy src/ --ignore-missing-imports || true
          
      - name: Run unit tests
        working-directory: ./apps/api-server
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/vietstore_test
          REDIS_URL: redis://localhost:6379/0
          QDRANT_URL: http://localhost:6333
          ENVIRONMENT: test
        run: |
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing --cov-report=html -x
          
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./apps/api-server/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false
          
      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: apps/api-server/htmlcov/
          retention-days: 30

  # Frontend Tests
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        app: [web-customer, web-owner, web-admin]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json
      
      - name: Install dependencies
        working-directory: ./apps/${{ matrix.app }}
        run: npm ci
      
      - name: Run linter
        working-directory: ./apps/${{ matrix.app }}
        run: npm run lint --if-present
        continue-on-error: true
      
      - name: Run type check
        working-directory: ./apps/${{ matrix.app }}
        run: npm run type-check --if-present
        continue-on-error: true
      
      - name: Run unit tests
        working-directory: ./apps/${{ matrix.app }}
        run: npm run test:unit --if-present
        continue-on-error: true
      
      - name: Build
        working-directory: ./apps/${{ matrix.app }}
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.app }}
          path: apps/${{ matrix.app }}/dist/
          retention-days: 7

  # E2E Tests
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    
    strategy:
      fail-fast: false
      matrix:
        app: [web-customer, web-owner, web-admin]
    
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vietstore_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        working-directory: ./apps/${{ matrix.app }}
        run: npm ci
      
      - name: Install Playwright
        run: npx playwright install --with-deps
      
      - name: Run E2E tests
        working-directory: ./apps/${{ matrix.app }}
        run: npm run test:e2e
        env:
          CI: true
      
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.app }}
          path: apps/${{ matrix.app }}/playwright-report/
          retention-days: 7

  # Build Docker Images
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, e2e-tests]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Extract metadata for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/vietstore-api
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
      
      - name: Build and push API Server
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api-server
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build Customer App
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web-customer
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: ${{ secrets.DOCKER_USERNAME }}/vietstore-customer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build Owner App
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web-owner
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: ${{ secrets.DOCKER_USERNAME }}/vietstore-owner:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build Admin App
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web-admin
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: ${{ secrets.DOCKER_USERNAME }}/vietstore-admin:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.vietstore.vn
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add your staging deployment commands here
          # Example: kubectl apply -f k8s/staging/
      
      - name: Run smoke tests
        run: |
          echo "Running smoke tests on staging..."
          # Add smoke test commands here

  # Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment:
      name: production
      url: https://vietstore.vn
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          # Add your production deployment commands here
          # Example: kubectl apply -f k8s/production/
      
      - name: Run smoke tests
        run: |
          echo "Running smoke tests on production..."
          # Add smoke test commands here
      
      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        if: success()
        with:
          status: ${{ job.status }}
          text: 'Production deployment successful!'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

  # Report Results
  report:
    name: Report Results
    runs-on: ubuntu-latest
    needs: [security-scan, test-backend, test-frontend, e2e-tests]
    if: always()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate test report
        run: |
          echo "# CI/CD Pipeline Report" > report.md
          echo "" >> report.md
          echo "## Security Scan" >> report.md
          echo "- Status: ${{ needs.security-scan.result }}" >> report.md
          echo "" >> report.md
          echo "## Backend Tests" >> report.md
          echo "- Status: ${{ needs.test-backend.result }}" >> report.md
          echo "" >> report.md
          echo "## Frontend Tests" >> report.md
          echo "- Status: ${{ needs.test-frontend.result }}" >> report.md
          echo "" >> report.md
          echo "## E2E Tests" >> report.md
          echo "- Status: ${{ needs.e2e-tests.result }}" >> report.md
      
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: ci-report
          path: report.md
