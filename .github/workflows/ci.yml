name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vietstore_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install uv
        run: pip install uv

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('apps/api-server/pyproject.toml') }}

      - name: Setup backend
        working-directory: apps/api-server
        run: uv sync

      - name: Security audit
        working-directory: apps/api-server
        run: |
          pip install pip-audit
          pip-audit || echo "Security audit completed with warnings"

      - name: Run Ruff lint
        working-directory: apps/api-server
        run: uv run ruff check src/

      - name: Run Ruff format check
        working-directory: apps/api-server
        run: uv run ruff format --check src/

      - name: Run type check
        working-directory: apps/api-server
        run: uv run ruff check src/ --select I

      - name: Run tests
        working-directory: apps/api-server
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/vietstore_test
        run: uv run pytest tests/ -v --cov=src/ --cov-report=xml || echo "No tests yet"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: success()
        with:
          file: ./coverage.xml
          flags: backend

  frontend-customer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web-customer/package-lock.json
      
      - name: Install dependencies
        working-directory: apps/web-customer
        run: npm ci
      
      - name: Run ESLint
        working-directory: apps/web-customer
        run: npm run lint
      
      - name: Run Prettier check
        working-directory: apps/web-customer
        run: npm run format:check
      
      - name: Run TypeScript check
        working-directory: apps/web-customer
        run: npx tsc --noEmit
      
      - name: Build
        working-directory: apps/web-customer
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-customer-build
          path: apps/web-customer/dist

  frontend-owner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web-owner/package-lock.json
      
      - name: Install dependencies
        working-directory: apps/web-owner
        run: npm ci
      
      - name: Run ESLint
        working-directory: apps/web-owner
        run: npm run lint
      
      - name: Run Prettier check
        working-directory: apps/web-owner
        run: npm run format:check
      
      - name: Run TypeScript check
        working-directory: apps/web-owner
        run: npx tsc --noEmit
      
      - name: Build
        working-directory: apps/web-owner
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-owner-build
          path: apps/web-owner/dist

  frontend-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web-admin/package-lock.json
      
      - name: Install dependencies
        working-directory: apps/web-admin
        run: npm ci
      
      - name: Run ESLint
        working-directory: apps/web-admin
        run: npm run lint
      
      - name: Run Prettier check
        working-directory: apps/web-admin
        run: npm run format:check
      
      - name: Run TypeScript check
        working-directory: apps/web-admin
        run: npx tsc --noEmit
      
      - name: Build
        working-directory: apps/web-admin
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-admin-build
          path: apps/web-admin/dist

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
