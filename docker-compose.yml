version: '3.8'

services:
  # PostgreSQL with PostGIS
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: vietstore-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-vietstore}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vietstore-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: vietstore-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vietstore-network

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: vietstore-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vietstore-network

  # API Server
  api-server:
    build:
      context: ./apps/api-server
      dockerfile: Dockerfile
    container_name: vietstore-api
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-vietstore}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:3001,http://localhost:3002}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ES256
      ECC_PRIVATE_KEY_PEM: ${ECC_PRIVATE_KEY_PEM}
      CSRF_SECRET_KEY: ${CSRF_SECRET_KEY}
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    ports:
      - "9000:9000"
    volumes:
      - ./apps/api-server:/app
      - data:/app/data
    networks:
      - vietstore-network
    restart: unless-stopped

  # Customer App
  web-customer:
    build:
      context: ./apps/web-customer
      dockerfile: Dockerfile
    container_name: vietstore-customer
    environment:
      VITE_API_URL: http://localhost:9000
    depends_on:
      - api-server
    ports:
      - "3000:80"
    networks:
      - vietstore-network
    restart: unless-stopped

  # Owner App
  web-owner:
    build:
      context: ./apps/web-owner
      dockerfile: Dockerfile
    container_name: vietstore-owner
    environment:
      VITE_API_URL: http://localhost:9000
    depends_on:
      - api-server
    ports:
      - "3001:80"
    networks:
      - vietstore-network
    restart: unless-stopped

  # Admin App
  web-admin:
    build:
      context: ./apps/web-admin
      dockerfile: Dockerfile
    container_name: vietstore-admin
    environment:
      VITE_API_URL: http://localhost:9000
    depends_on:
      - api-server
    ports:
      - "3002:80"
    networks:
      - vietstore-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: vietstore-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web-customer
      - web-owner
      - web-admin
      - api-server
    networks:
      - vietstore-network
    restart: unless-stopped

  # Prometheus (Monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: vietstore-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    networks:
      - vietstore-network
    restart: unless-stopped

  # Grafana (Monitoring Dashboard)
  grafana:
    image: grafana/grafana:latest
    container_name: vietstore-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3003:3000"
    depends_on:
      - prometheus
    networks:
      - vietstore-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  data:
  prometheus_data:
  grafana_data:

networks:
  vietstore-network:
    driver: bridge
